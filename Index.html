<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <title>Edus | Catalog Virtual</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0f2f5; margin: 0; padding: 0; }
        .header { background-color: #0056b3; color: white; padding: 15px; text-align: center; font-weight: bold; font-size: 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .container { max-width: 500px; margin: 30px auto; background: white; border-radius: 12px; overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .user-info { padding: 20px; background: #e9ecef; border-bottom: 1px solid #ddd; }
        .grades-table { width: 100%; border-collapse: collapse; }
        .grades-table td { padding: 15px; border-bottom: 1px solid #eee; }
        .subject { font-weight: 600; color: #333; }
        .grade { float: right; color: #d9534f; font-weight: bold; font-size: 18px; background: #ffe6e6; padding: 2px 10px; border-radius: 5px; border: 1px solid #f5c6cb; }
        .footer { text-align: center; padding: 20px; color: #888; font-size: 12px; }
    </style>
</head>
<body>
    <div class="header">EDUS - Situație Școlară</div>
    <div class="container">
        <div class="user-info">
            <strong>Elev:</strong> [Numele Colegului Tău]<br>
            <strong>Clasa:</strong> a IX-a B
        </div>
        <table class="grades-table">
            <tr><td><span class="subject">Matematică</span> <span class="grade">4</span></td></tr>
            <tr><td><span class="subject">Limba Română</span> <span class="grade">4</span></td></tr>
            <tr><td><span class="subject">Fizică</span> <span class="grade">4</span></td></tr>
            <tr><td><span class="subject">Istorie</span> <span class="grade">4</span></td></tr>
            <tr><td><span class="subject">Biologie</span> <span class="grade">4</span></td></tr>
        </table>
        <div class="footer">© 2026 Edus Platform. Toate drepturile rezervate.</div>
    </div>
</body>
</html>
